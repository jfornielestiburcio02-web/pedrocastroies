# Configuración para Firebase App Hosting
runConfig:
  maxInstances: 1

env:
  # Definición de variables de entorno inyectadas desde el repositorio/entorno
  - variable: PEDROCASTRO_IMAGENES_GENERA
  - variable: GITHUB_OWNER
    value: "iespedrocastro"
  - variable: GITHUB_REPO
    value: "rayuela-app"
